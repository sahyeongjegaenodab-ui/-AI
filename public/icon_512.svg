<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <linearGradient id="neonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="50%" stop-color="#ec4899" />
      <stop offset="100%" stop-color="#f43f5e" />
    </linearGradient>
    <linearGradient id="screenGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#090d16" />
      <stop offset="100%" stop-color="#1e1b4b" />
    </linearGradient>
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="eyeGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />
  <rect x="56" y="56" width="400" height="400" rx="90" fill="none" stroke="url(#neonGrad)" stroke-width="8" filter="url(#neonGlow)" opacity="0.6" />
  <rect x="56" y="56" width="400" height="400" rx="90" fill="none" stroke="url(#neonGrad)" stroke-width="4" />
  <rect x="76" y="76" width="360" height="360" rx="72" fill="url(#screenGrad)" stroke="#1e293b" stroke-width="4" />
  <rect x="36" y="216" width="20" height="80" rx="8" fill="#4f46e5" opacity="0.8" />
  <rect x="456" y="216" width="20" height="80" rx="8" fill="#f43f5e" opacity="0.8" />
  <g filter="url(#eyeGlow)">
    <ellipse cx="180" cy="230" rx="32" ry="12" fill="#ec4899" opacity="0.2" />
    <path d="M 148 215 L 212 230" stroke="#f43f5e" stroke-width="12" stroke-linecap="round" />
    <circle cx="180" cy="245" r="14" fill="#ffffff" />
    <circle cx="180" cy="245" r="8" fill="#f43f5e" />
  </g>
  <g filter="url(#eyeGlow)">
    <ellipse cx="332" cy="230" rx="32" ry="12" fill="#6366f1" opacity="0.2" />
    <path d="M 364 215 L 300 230" stroke="#6366f1" stroke-width="12" stroke-linecap="round" />
    <circle cx="332" cy="245" r="14" fill="#ffffff" />
    <circle cx="332" cy="245" r="8" fill="#6366f1" />
  </g>
  <g filter="url(#eyeGlow)">
    <path d="M 216 320 L 296 320" stroke="#f43f5e" stroke-width="14" stroke-linecap="round" opacity="0.9" />
    <path d="M 230 320 L 282 320" stroke="#ffffff" stroke-width="6" stroke-linecap="round" />
  </g>
  <path d="M 256 76 L 256 40" stroke="url(#neonGrad)" stroke-width="6" stroke-linecap="round" />
  <circle cx="256" cy="30" r="12" fill="#ec4899" filter="url(#eyeGlow)" />
</svg>
